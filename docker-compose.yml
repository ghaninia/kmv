services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kmv-laravel-app
    container_name: kmv-laravel-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      APP_URL: http://localhost:8000
    networks:
      - kmv-network
    expose:
      - 9000

  nginx:
    image: nginx:alpine
    container_name: kmv-nginx
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - '8000:80'
    networks:
      - kmv-network
    depends_on:
      - app

  react:
    build:
      context: .
      dockerfile: Dockerfile.react
    image: kmv-react
    container_name: kmv-react
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/node_modules
    ports:
      - '5173:5173'
    networks:
      - kmv-network
    depends_on:
      - app
    environment:
      - VITE_BACKEND_URL=http://localhost:8000

networks:
  kmv-network:
    driver: bridge

