services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kmv-laravel-app
    container_name: kmv-laravel-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      APP_URL: http://localhost:8080
    networks:
      - kmv-network

  web:
    image: nginx:stable-alpine
    container_name: kmv-laravel-web
    depends_on:
      - app
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kmv-network

networks:
  kmv-network:
    driver: bridge
